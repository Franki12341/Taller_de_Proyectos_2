sonar.projectKey=smartsched-uc
sonar.projectName=SmartSched-UC
sonar.projectVersion=1.0

sonar.sources=client/src,server/src
sonar.tests=client/src,server/test
sonar.test.inclusions=client/src/**/*.test.js,server/test/**/*.test.js
sonar.exclusions=**/node_modules/**,**/build/**,**/coverage/**,**/.scannerwork/**
sonar.javascript.lcov.reportPaths=client/coverage/lcov.info,server/coverage/lcov.info

sonar.sourceEncoding=UTF-8

sonar.host.url=http://localhost:9000
