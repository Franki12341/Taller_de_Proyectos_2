<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SmartSched-UC</title>
</head>
<body>

<h1>📅 SmartSched-UC</h1>
<p>Generador de horarios sin solapamientos</p>

<button onclick="generar()">Generar Horario</button>

<pre id="resultado"></pre>

<script>
async function generar() {
  const res = await fetch("http://localhost:3001/api/schedule");
  const data = await res.json();
  document.getElementById("resultado").textContent =
    JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
