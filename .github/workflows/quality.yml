name: Quality validation

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
      - "security/**"
      - "accessibility/**"
      - "test/**"
      - "docs/**"
      - "ci/**"
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  quality:
    name: Tests and frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            smartsched-uc/client/package-lock.json
            smartsched-uc/server/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: smartsched-uc/server
        run: npm ci

      - name: Install frontend dependencies
        working-directory: smartsched-uc/client
        run: npm ci

      - name: Run all tests from repository root
        run: npm test
        env:
          NODE_ENV: test
          USE_POSTGRES: "false"
          CI: "true"

      - name: Build frontend
        run: npm run build
        env:
          CI: "true"
